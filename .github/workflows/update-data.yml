name: Update data

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 09:00 KST
    - cron: "0 9 * * *"   # 매일 18:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run auctions scraper
        run: python scripts/auctions_scraper.py
        continue-on-error: true

      - name: Run Meta news scraper
        run: python scripts/meta_news_scraper.py
        continue-on-error: true

      - name: Run stock screener
        run: python scripts/stock_screener.py
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: update data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
